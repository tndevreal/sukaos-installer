[bar/example]
width = 100%
height = 32
radius = 12

override-redirect = true
wm-restack = generic
fixed-center = true
enable-ipc = true

background = #222222
foreground = #ffffff

padding-left = 6
padding-right = 6
module-margin = 4

separator = " | "
separator-foreground = #555555

font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left   = title memory
modules-center = date battery
modules-right  = cpu pulseaudio


; -------------------------
;       MODULES
; -------------------------

[module/title]
type = internal/xwindow
label = %title%
label-maxlen = 60
label-empty = "Desktop"
padding-left = 4
padding-right = 4

[module/date]
type = internal/date
interval = 1
date = %H:%M:%S
label = %date%
padding-left = 4
padding-right = 4

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = CPU %percentage%%
padding-left = 4
padding-right = 4

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = RAM %percentage_used%%
padding-left = 4
padding-right = 4

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = CHARGING: %percentage%%
label-discharging = BAT: %percentage%%
padding-left = 4
padding-right = 4

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = 🔊 %percentage%%
label-muted = 🔇 muted
padding-left = 4
padding-right = 4

