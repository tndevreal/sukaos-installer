[bar/example]
width = 100%
height = 32

override-redirect = true
wm-restack = generic
fixed-center = true
enable-ipc = true

background = #222222
foreground = #ffffff

font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left   = pulseaudio
modules-center = date 
modules-right  = cpu 


; -------------------------
;       MODULES
; -------------------------

[module/title]
type = internal/xwindow
label = %title%
label-maxlen = 60
label-empty = "Desktop"

[module/pulseaudio]
type = internal/pulseaudio
interval = 2
format = <label>
label= %percentage%

[module/date]
type = internal/date
interval = 1
date = %H:%M:%S
label = %date%

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = CPU %percentage%%

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = RAM %percentage_used%%

